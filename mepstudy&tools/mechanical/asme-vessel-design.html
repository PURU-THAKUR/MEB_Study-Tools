<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASME Vessel Design - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header> <!-- same header as above -->
    <div class="calc-container">
        <a href="../index.html#mechanical" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Mechanical</a>
        <div class="calc-card">
            <h2>ASME Section VIII Div. 1 Shell Thickness</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Internal pressure P (psi):</label>
                    <input type="number" id="P" step="1" value="150">
                </div>
                <div class="form-group">
                    <label>Inside radius R (in):</label>
                    <input type="number" id="R" step="0.1" value="30">
                </div>
                <div class="form-group">
                    <label>Allowable stress S (psi):</label>
                    <input type="number" id="S" step="100" value="17500">
                </div>
                <div class="form-group">
                    <label>Joint efficiency E:</label>
                    <input type="number" id="E" step="0.01" value="0.85">
                </div>
                <div class="form-group">
                    <label>Corrosion allowance (in):</label>
                    <input type="number" id="CA" step="0.01" value="0.125">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Required thickness (without CA): <strong id="t">0</strong> in</p>
                <p>Thickness + corrosion allowance: <strong id="tCA">0</strong> in</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const P = parseFloat(document.getElementById('P').value);
            const R = parseFloat(document.getElementById('R').value);
            const S = parseFloat(document.getElementById('S').value);
            const E = parseFloat(document.getElementById('E').value);
            const CA = parseFloat(document.getElementById('CA').value);

            const t = (P * R) / (S * E - 0.6 * P);
            const tCA = t + CA;

            document.getElementById('t').innerText = t.toFixed(3);
            document.getElementById('tCA').innerText = tCA.toFixed(3);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
