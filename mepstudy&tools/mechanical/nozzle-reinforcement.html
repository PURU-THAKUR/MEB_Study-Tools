<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nozzle Reinforcement - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#mechanical" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Mechanical</a>
        <div class="calc-card">
            <h2>Nozzle Reinforcement (Area Replacement)</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Shell thickness (mm):</label>
                    <input type="number" id="ts" step="0.1" value="10">
                </div>
                <div class="form-group">
                    <label>Nozzle thickness (mm):</label>
                    <input type="number" id="tn" step="0.1" value="8">
                </div>
                <div class="form-group">
                    <label>Nozzle inside diameter (mm):</label>
                    <input type="number" id="d" step="1" value="200">
                </div>
                <div class="form-group">
                    <label>Required thickness (mm):</label>
                    <input type="number" id="tr" step="0.1" value="9">
                </div>
                <button type="button" class="btn" onclick="calculate()">Check Area</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Available area in shell: <strong id="A1">0</strong> mm²</p>
                <p>Available area in nozzle: <strong id="A2">0</strong> mm²</p>
                <p>Total available A: <strong id="Atot">0</strong> mm²</p>
                <p>Required area A_req: <strong id="Areq">0</strong> mm²</p>
                <p>Status: <strong id="status"></strong></p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const ts = parseFloat(document.getElementById('ts').value);
            const tn = parseFloat(document.getElementById('tn').value);
            const d = parseFloat(document.getElementById('d').value);
            const tr = parseFloat(document.getElementById('tr').value);

            const Areq = d * tr;
            const A1 = d * (ts - tr);
            const A2 = 2 * (tn - tr) * (2.5 * ts); // simplified

            const total = A1 + A2;

            const status = total >= Areq ? '✅ Adequate' : '❌ Need reinforcement';

            document.getElementById('A1').innerText = A1.toFixed(0);
            document.getElementById('A2').innerText = A2.toFixed(0);
            document.getElementById('Atot').innerText = total.toFixed(0);
            document.getElementById('Areq').innerText = Areq.toFixed(0);
            document.getElementById('status').innerText = status;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
