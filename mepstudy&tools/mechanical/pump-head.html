<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pump Head - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#mechanical" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Mechanical</a>
        <div class="calc-card">
            <h2>Total Dynamic Head</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Static head (m):</label>
                    <input type="number" id="hs" step="0.1" value="10">
                </div>
                <div class="form-group">
                    <label>Pressure head (m) – outlet pressure:</label>
                    <input type="number" id="hp" step="0.1" value="5">
                </div>
                <div class="form-group">
                    <label>Friction head loss (m):</label>
                    <input type="number" id="hf" step="0.1" value="3">
                </div>
                <div class="form-group">
                    <label>Velocity head (m) – usually small:</label>
                    <input type="number" id="hv" step="0.01" value="0.2">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate TDH</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Total Dynamic Head: <strong id="tdh">0</strong> m</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const hs = parseFloat(document.getElementById('hs').value);
            const hp = parseFloat(document.getElementById('hp').value);
            const hf = parseFloat(document.getElementById('hf').value);
            const hv = parseFloat(document.getElementById('hv').value);

            const tdh = hs + hp + hf + hv;

            document.getElementById('tdh').innerText = tdh.toFixed(2);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
