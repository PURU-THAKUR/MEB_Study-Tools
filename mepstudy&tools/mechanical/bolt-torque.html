<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolt Torque - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#mechanical" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Mechanical</a>
        <div class="calc-card">
            <h2>Bolt Torque to Preload</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Bolt diameter (mm):</label>
                    <input type="number" id="d" step="1" value="12">
                </div>
                <div class="form-group">
                    <label>Desired preload (kN):</label>
                    <input type="number" id="F" step="0.1" value="20">
                </div>
                <div class="form-group">
                    <label>Friction coefficient (0.12–0.20):</label>
                    <input type="number" id="mu" step="0.01" value="0.15">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate Torque</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Recommended torque: <strong id="T">0</strong> N·m</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const d = parseFloat(document.getElementById('d').value) / 1000; // m
            const F = parseFloat(document.getElementById('F').value) * 1000; // N
            const mu = parseFloat(document.getElementById('mu').value);

            const T = 0.2 * F * d; // simplified formula T = k F d, with k≈0.2
            document.getElementById('T').innerText = T.toFixed(1);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
