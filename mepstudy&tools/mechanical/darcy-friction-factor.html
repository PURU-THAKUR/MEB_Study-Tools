<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darcy Friction Factor - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#mechanical" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Mechanical</a>
        <div class="calc-card">
            <h2>Darcy‑Weisbach Friction Factor</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Reynolds number Re:</label>
                    <input type="number" id="Re" step="100" value="50000">
                </div>
                <div class="form-group">
                    <label>Relative roughness ε/D:</label>
                    <input type="number" id="relRough" step="0.0001" value="0.001">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate f</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Friction factor f (Colebrook): <strong id="f">0</strong></p>
                <p>Flow regime: <strong id="regime"></strong></p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function colebrook(Re, relRough) {
            if (Re < 2000) return 64 / Re; // laminar
            let f = 0.02;
            for (let i = 0; i < 20; i++) {
                const term = relRough / 3.7 + 2.51 / (Re * Math.sqrt(f));
                const fNew = Math.pow(-2 * Math.log10(term), -2);
                if (Math.abs(f - fNew) < 1e-6) return fNew;
                f = fNew;
            }
            return f;
        }

        function calculate() {
            const Re = parseFloat(document.getElementById('Re').value);
            const relRough = parseFloat(document.getElementById('relRough').value);
            const f = colebrook(Re, relRough);

            let regime = '';
            if (Re < 2000) regime = 'Laminar';
            else if (Re < 4000) regime = 'Transitional';
            else regime = 'Turbulent';

            document.getElementById('f').innerText = f.toFixed(4);
            document.getElementById('regime').innerText = regime;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
