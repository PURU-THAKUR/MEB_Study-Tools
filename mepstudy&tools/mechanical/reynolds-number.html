<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reynolds Number - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#mechanical" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Mechanical</a>
        <div class="calc-card">
            <h2>Reynolds Number Calculator</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Pipe diameter (mm):</label>
                    <input type="number" id="D" step="1" value="50">
                </div>
                <div class="form-group">
                    <label>Velocity (m/s):</label>
                    <input type="number" id="v" step="0.1" value="2">
                </div>
                <div class="form-group">
                    <label>Fluid density (kg/m³):</label>
                    <input type="number" id="rho" step="1" value="1000">
                </div>
                <div class="form-group">
                    <label>Dynamic viscosity (Pa·s):</label>
                    <input type="number" id="mu" step="1e-4" value="0.001">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate Re</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Reynolds number: <strong id="Re">0</strong></p>
                <p>Flow regime: <strong id="regime"></strong></p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const D = parseFloat(document.getElementById('D').value) / 1000;
            const v = parseFloat(document.getElementById('v').value);
            const rho = parseFloat(document.getElementById('rho').value);
            const mu = parseFloat(document.getElementById('mu').value);

            const Re = rho * v * D / mu;
            let regime = '';
            if (Re < 2000) regime = 'Laminar';
            else if (Re < 4000) regime = 'Transitional';
            else regime = 'Turbulent';

            document.getElementById('Re').innerText = Re.toFixed(0);
            document.getElementById('regime').innerText = regime;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
