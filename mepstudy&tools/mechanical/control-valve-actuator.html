<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Valve Actuator - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#mechanical" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Mechanical</a>
        <div class="calc-card">
            <h2>Pneumatic Actuator Thrust</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Air supply pressure (bar):</label>
                    <input type="number" id="P" step="0.1" value="6">
                </div>
                <div class="form-group">
                    <label>Diaphragm area (cm²):</label>
                    <input type="number" id="A" step="1" value="100">
                </div>
                <div class="form-group">
                    <label>Spring range (bar):</label>
                    <input type="text" id="spring" placeholder="e.g. 1–2" value="1-2">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate Force</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Maximum force: <strong id="Fmax">0</strong> N</p>
                <p>Minimum force: <strong id="Fmin">0</strong> N</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const P = parseFloat(document.getElementById('P').value) * 1e5; // Pa
            const A = parseFloat(document.getElementById('A').value) * 1e-4; // m²
            const springRange = document.getElementById('spring').value.split('-');
            const Pmin = parseFloat(springRange[0]) * 1e5;
            const Pmax = parseFloat(springRange[1]) * 1e5;

            const Fmax = (P - Pmin) * A;
            const Fmin = (P - Pmax) * A;

            document.getElementById('Fmax').innerText = Fmax.toFixed(0);
            document.getElementById('Fmin').innerText = Fmin.toFixed(0);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
