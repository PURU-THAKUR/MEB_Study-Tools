<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profibus Calculator - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#instrumentation" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>
        <div class="calc-card">
            <h2>Profibus PA / DP Cable Length</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Baud rate (kbps):</label>
                    <select id="baud">
                        <option value="93.75">93.75</option>
                        <option value="187.5">187.5</option>
                        <option value="500">500</option>
                        <option value="1500">1500</option>
                        <option value="12000">12000</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cable type:</label>
                    <select id="cable">
                        <option value="A">Type A (shielded twisted pair)</option>
                        <option value="B">Type B (ordinary)</option>
                    </select>
                </div>
                <button type="button" class="btn" onclick="calculate()">Max Segment Length</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Maximum segment length: <strong id="len">0</strong> m</p>
                <p>Recommended repeater spacing: <strong id="rep">0</strong> m</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const baud = parseFloat(document.getElementById('baud').value);
            const cable = document.getElementById('cable').value;

            let maxLen;
            if (cable === 'A') {
                if (baud <= 93.75) maxLen = 1200;
                else if (baud <= 187.5) maxLen = 1000;
                else if (baud <= 500) maxLen = 400;
                else if (baud <= 1500) maxLen = 200;
                else maxLen = 100;
            } else {
                if (baud <= 93.75) maxLen = 1200;
                else if (baud <= 187.5) maxLen = 600;
                else if (baud <= 500) maxLen = 200;
                else maxLen = 100;
            }

            document.getElementById('len').innerText = maxLen;
            document.getElementById('rep').innerText = Math.floor(maxLen * 0.8);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
