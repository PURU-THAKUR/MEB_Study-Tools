<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrument Range - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#instrumentation" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>
        <div class="calc-card">
            <h2>Instrument Range (4‑20mA Scaling)</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Process variable min (EU):</label>
                    <input type="number" id="minPV" step="any" value="0">
                </div>
                <div class="form-group">
                    <label>Process variable max (EU):</label>
                    <input type="number" id="maxPV" step="any" value="100">
                </div>
                <div class="form-group">
                    <label>Desired reading (EU):</label>
                    <input type="number" id="pv" step="any" value="50">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate mA</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Output current: <strong id="mA">0</strong> mA</p>
                <p>Percentage of span: <strong id="percent">0</strong>%</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const minPV = parseFloat(document.getElementById('minPV').value);
            const maxPV = parseFloat(document.getElementById('maxPV').value);
            const pv = parseFloat(document.getElementById('pv').value);

            const span = maxPV - minPV;
            const percent = (pv - minPV) / span * 100;
            const mA = 4 + (16 * percent / 100);

            document.getElementById('percent').innerText = percent.toFixed(1);
            document.getElementById('mA').innerText = mA.toFixed(2);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
