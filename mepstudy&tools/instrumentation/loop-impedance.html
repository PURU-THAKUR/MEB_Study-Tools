<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Impedance - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#instrumentation" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>
        <div class="calc-card">
            <h2>4‑20mA Loop Impedance</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Power supply voltage (V):</label>
                    <input type="number" id="Vs" step="0.1" value="24">
                </div>
                <div class="form-group">
                    <label>Transmitter minimum voltage (V):</label>
                    <input type="number" id="Vtx" step="0.1" value="12">
                </div>
                <div class="form-group">
                    <label>Receiver burden (Ω):</label>
                    <input type="number" id="Rrec" step="1" value="250">
                </div>
                <div class="form-group">
                    <label>Cable resistance per km (Ω/km):</label>
                    <input type="number" id="Rcable" step="0.1" value="50">
                </div>
                <div class="form-group">
                    <label>Cable length (m):</label>
                    <input type="number" id="L" step="10" value="100">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate Max Loop</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Maximum loop resistance: <strong id="Rmax">0</strong> Ω</p>
                <p>Actual loop resistance: <strong id="Ract">0</strong> Ω</p>
                <p>Status: <strong id="status"></strong></p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const Vs = parseFloat(document.getElementById('Vs').value);
            const Vtx = parseFloat(document.getElementById('Vtx').value);
            const Rrec = parseFloat(document.getElementById('Rrec').value);
            const Rcable = parseFloat(document.getElementById('Rcable').value);
            const L = parseFloat(document.getElementById('L').value);

            const Rmax = (Vs - Vtx) / 0.02; // 20mA max
            const RcableTotal = Rcable * L / 1000; // total loop resistance (2 wires)
            const Ract = Rrec + RcableTotal;

            const status = Ract <= Rmax ? '✅ OK' : '❌ Exceeds limit';

            document.getElementById('Rmax').innerText = Rmax.toFixed(1);
            document.getElementById('Ract').innerText = Ract.toFixed(1);
            document.getElementById('status').innerText = status;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
