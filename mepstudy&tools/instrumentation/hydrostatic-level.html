<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrostatic Level - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#instrumentation" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>
        <div class="calc-card">
            <h2>Hydrostatic Level from Pressure</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Measured pressure (Pa):</label>
                    <input type="number" id="p" step="1" value="50000">
                </div>
                <div class="form-group">
                    <label>Fluid density (kg/m³):</label>
                    <input type="number" id="rho" step="1" value="1000">
                </div>
                <div class="form-group">
                    <label>Gravity (m/s²):</label>
                    <input type="number" id="g" step="0.01" value="9.81">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate Level</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Level: <strong id="level">0</strong> m</p>
                <p>Equivalent head: <strong id="head">0</strong> mmH₂O</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const p = parseFloat(document.getElementById('p').value);
            const rho = parseFloat(document.getElementById('rho').value);
            const g = parseFloat(document.getElementById('g').value);

            const h = p / (rho * g);
            const mmH2O = p / 9.80665;

            document.getElementById('level').innerText = h.toFixed(3);
            document.getElementById('head').innerText = mmH2O.toFixed(1);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
