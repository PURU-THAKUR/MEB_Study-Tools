<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cv/Kv Valve Sizing - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#instrumentation" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>
        <div class="calc-card">
            <h2>Cv / Kv Valve Sizing (Liquid)</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Flow rate (m³/h):</label>
                    <input type="number" id="q" step="0.1" value="10">
                </div>
                <div class="form-group">
                    <label>Specific gravity (water=1):</label>
                    <input type="number" id="sg" step="0.01" value="1">
                </div>
                <div class="form-group">
                    <label>Pressure drop ΔP (bar):</label>
                    <input type="number" id="dp" step="0.1" value="1">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Cv (US gal/min): <strong id="cv">0</strong></p>
                <p>Kv (m³/h): <strong id="kv">0</strong></p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const q = parseFloat(document.getElementById('q').value);
            const sg = parseFloat(document.getElementById('sg').value);
            const dp = parseFloat(document.getElementById('dp').value);

            const kv = q * Math.sqrt(sg / dp);
            const cv = kv * 1.156; // 1 Kv = 1.156 Cv approx

            document.getElementById('kv').innerText = kv.toFixed(2);
            document.getElementById('cv').innerText = cv.toFixed(2);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
