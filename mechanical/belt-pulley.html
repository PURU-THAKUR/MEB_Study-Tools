<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belt & Pulley - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#mechanical" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Mechanical</a>
        <div class="calc-card">
            <h2>Belt Drive Speed Ratio</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Driver pulley diameter (mm):</label>
                    <input type="number" id="d1" step="1" value="200">
                </div>
                <div class="form-group">
                    <label>Driven pulley diameter (mm):</label>
                    <input type="number" id="d2" step="1" value="400">
                </div>
                <div class="form-group">
                    <label>Driver speed (RPM):</label>
                    <input type="number" id="n1" step="1" value="1500">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Speed ratio: <strong id="ratio">0</strong></p>
                <p>Driven speed: <strong id="n2">0</strong> RPM</p>
                <p>Belt speed: <strong id="v">0</strong> m/s</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const d1 = parseFloat(document.getElementById('d1').value) / 1000; // m
            const d2 = parseFloat(document.getElementById('d2').value) / 1000;
            const n1 = parseFloat(document.getElementById('n1').value);

            const ratio = d2 / d1;
            const n2 = n1 / ratio;
            const v = Math.PI * d1 * n1 / 60;

            document.getElementById('ratio').innerText = ratio.toFixed(2);
            document.getElementById('n2').innerText = n2.toFixed(0);
            document.getElementById('v').innerText = v.toFixed(2);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
