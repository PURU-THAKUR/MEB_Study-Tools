<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatigue Analysis - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#mechanical" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Mechanical</a>
        <div class="calc-card">
            <h2>Modified Goodman Diagram</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Mean stress σm (MPa):</label>
                    <input type="number" id="sm" step="1" value="50">
                </div>
                <div class="form-group">
                    <label>Alternating stress σa (MPa):</label>
                    <input type="number" id="sa" step="1" value="30">
                </div>
                <div class="form-group">
                    <label>Ultimate tensile strength Sut (MPa):</label>
                    <input type="number" id="sut" step="10" value="400">
                </div>
                <div class="form-group">
                    <label>Endurance limit Se (MPa):</label>
                    <input type="number" id="se" step="10" value="200">
                </div>
                <button type="button" class="btn" onclick="calculate()">Check Safety</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Goodman factor: <strong id="goodman">0</strong></p>
                <p>Status: <strong id="status"></strong></p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const sm = parseFloat(document.getElementById('sm').value);
            const sa = parseFloat(document.getElementById('sa').value);
            const sut = parseFloat(document.getElementById('sut').value);
            const se = parseFloat(document.getElementById('se').value);

            const factor = sa / se + sm / sut;
            const safe = factor <= 1 ? '✅ Safe' : '❌ Failure predicted';

            document.getElementById('goodman').innerText = factor.toFixed(3);
            document.getElementById('status').innerText = safe;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
