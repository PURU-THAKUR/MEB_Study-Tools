<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Expansion - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#mechanical" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Mechanical</a>
        <div class="calc-card">
            <h2>Linear Thermal Expansion</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Material:</label>
                    <select id="material">
                        <option value="steel">Steel (α=12e-6)</option>
                        <option value="al">Aluminium (α=23e-6)</option>
                        <option value="cu">Copper (α=17e-6)</option>
                        <option value="ss">Stainless (α=17e-6)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Length (m):</label>
                    <input type="number" id="L" step="0.1" value="10">
                </div>
                <div class="form-group">
                    <label>Temperature change ΔT (°C):</label>
                    <input type="number" id="dT" step="1" value="50">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate Expansion</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Expansion ΔL: <strong id="delta">0</strong> mm</p>
                <p>Final length: <strong id="Lf">0</strong> m</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        const alpha = {
            steel: 12e-6,
            al: 23e-6,
            cu: 17e-6,
            ss: 17e-6
        };

        function calculate() {
            const mat = document.getElementById('material').value;
            const L = parseFloat(document.getElementById('L').value);
            const dT = parseFloat(document.getElementById('dT').value);

            const a = alpha[mat];
            const delta = a * L * dT * 1000; // mm
            const Lf = L + delta / 1000;

            document.getElementById('delta').innerText = delta.toFixed(2);
            document.getElementById('Lf').innerText = Lf.toFixed(4);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
