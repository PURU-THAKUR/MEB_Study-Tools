<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orifice Plate Beta - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#instrumentation" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>
        <div class="calc-card">
            <h2>Orifice Plate Beta Ratio</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Pipe inside diameter (mm):</label>
                    <input type="number" id="D" step="1" value="100">
                </div>
                <div class="form-group">
                    <label>Orifice bore diameter (mm):</label>
                    <input type="number" id="d" step="1" value="50">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate β</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Beta ratio β = d/D : <strong id="beta">0</strong></p>
                <p>β² : <strong id="beta2">0</strong></p>
                <p>Velocity of approach factor: <strong id="E">0</strong></p>
                <p>Status: <span id="status"></span></p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const D = parseFloat(document.getElementById('D').value);
            const d = parseFloat(document.getElementById('d').value);

            const beta = d / D;
            const beta2 = beta * beta;
            const E = 1 / Math.sqrt(1 - Math.pow(beta, 4));

            let status = '';
            if (beta >= 0.1 && beta <= 0.75) status = '✅ Within ISO 5167 range';
            else status = '⚠️ Outside recommended range (0.1–0.75)';

            document.getElementById('beta').innerText = beta.toFixed(3);
            document.getElementById('beta2').innerText = beta2.toFixed(3);
            document.getElementById('E').innerText = E.toFixed(3);
            document.getElementById('status').innerText = status;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
