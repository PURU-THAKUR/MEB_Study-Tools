<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capillary Length Error - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="navbar">
                <a href="../index.html" class="logo">MEP Study & Tools</a>
                <div class="nav-links">
                    <a href="../index.html#electrical">Electrical</a>
                    <a href="../index.html#instrumentation">Instrumentation</a>
                    <a href="../index.html#mechanical">Mechanical</a>
                    <a href="../index.html#faq">FAQ</a>
                </div>
                <div class="theme-toggle">
                    <i class="fas fa-sun"></i>
                    <label class="switch">
                        <input type="checkbox" id="theme-switch">
                        <span class="slider"></span>
                    </label>
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="calc-container" style="max-width:800px; margin:40px auto; padding:0 20px;">
        <a href="../index.html#instrumentation" class="back-btn" style="display:inline-block; margin-bottom:20px; color:var(--primary); text-decoration:none; font-weight:600;"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>

        <div class="calc-card">
            <h2>Capillary Length Error (Hydrostatic)</h2>
            <p>Calculate pressure error due to capillary fill fluid density and height difference.</p>

            <form id="calcForm">
                <div class="form-group">
                    <label>Fill fluid density (kg/m³):</label>
                    <input type="number" id="rho" step="1" value="970">
                </div>
                <div class="form-group">
                    <label>Vertical height difference (m):</label>
                    <input type="number" id="h" step="0.1" value="5">
                </div>
                <div class="form-group">
                    <label>Gravity (m/s²):</label>
                    <input type="number" id="g" step="0.01" value="9.81">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate Error</button>
            </form>

            <div class="result-box" id="result" style="display:none;">
                <h3>Pressure Error</h3>
                <p><strong id="errorPa">0</strong> Pa</p>
                <p><strong id="errorMbar">0</strong> mbar</p>
                <p><strong id="errorMmH2O">0</strong> mmH₂O</p>
            </div>
        </div>
    </div>

    <footer>...</footer> <!-- same footer as above, truncated for brevity -->

    <script src="../script.js"></script>
    <script>
        function calculate() {
            const rho = parseFloat(document.getElementById('rho').value);
            const h = parseFloat(document.getElementById('h').value);
            const g = parseFloat(document.getElementById('g').value);

            const errorPa = rho * g * h;
            const errorMbar = errorPa / 100;
            const errorMmH2O = errorPa / 9.80665; // 1 mmH2O = 9.80665 Pa

            document.getElementById('errorPa').innerText = errorPa.toFixed(1);
            document.getElementById('errorMbar').innerText = errorMbar.toFixed(2);
            document.getElementById('errorMmH2O').innerText = errorMmH2O.toFixed(1);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
