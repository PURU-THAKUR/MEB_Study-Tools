<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profibus Calculator - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    .btn {
    background: var(--grad);
    /* ... */
}
.header {
    background: var(--grad);
}
/* electrical orange theme override */
        .header {
            background: linear-gradient(135deg, #f97316, #fb923c) !important;
        }
        .btn {
            background: linear-gradient(135deg, #f97316, #fb923c) !important;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3) !important;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.4) !important;
        }
        .result-box {
            border-left-color: #f97316 !important;
        }
        .result-value {
            color: #f97316 !important;
        }
        .back-btn {
            color: #f97316 !important;
        }
        .calc-card h2 {
            border-bottom-color: #f97316 !important;
            color: #f97316 !important;
        }
/* Steps container - always visible after result */
.steps-container {
    margin-top: 30px;
    display: none;
    width: 100%;
}

.steps-container.active {
    display: block;
}

/* Step card fix for light + orange mode */
.step-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
}

/* Force visible text in orange light mode */
.step-card,
.step-card p,
.step-card h4,
.step-card div {
    color: var(--text);
}

/* Formula box visibility fix */
.step-card .formula {
    background: rgba(0,0,0,0.05);
    border-left: 4px solid #f97316;
    padding: 15px;
    margin: 10px 0;
    font-family: monospace;
    overflow-x: auto;
    color: var(--text);
}

/* Result box fix */
.result-box {
    margin-top: 30px;
    padding: 20px;
    background: var(--card);
    border-radius: 12px;
    border-left: 4px solid #f97316;
}

/* Mobile responsive full width */
@media(max-width:768px){
    .calc-container{
        padding: 0 15px;
    }
    .calc-card{
        padding:20px;
    }
}
.step-card h4 {
    color: var(--primary);
    margin-top: 0;
    margin-bottom: 15px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
}
.step-card .formula {
    background: var(--bg);
    border-left: 3px solid var(--primary);
    padding: 15px;
    margin: 10px 0;
    font-family: monospace;
    overflow-x: auto;
}
.step-card .step-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary);
}
        .calc-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: 600; }
        .back-btn i { margin-right: 8px; }
        .calc-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; box-shadow: var(--shadow); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--heading); }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 6px;
            background: var(--bg); color: var(--text); font-size: 1rem;
        }
        .btn {
            background: var(--grad); color: white; border: none; padding: 14px 30px;
            border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(30,58,138,0.3); transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(30,58,138,0.4); }
        .result-box {
    margin-top: 30px;
    padding: 20px;
    background: var(--card);   /* bg ki jagah card use karo */
    border-radius: 8px;
    border-left: 4px solid var(--primary);
    display: none;
    transition: 0.3s ease;
}

.result-box.show {
    display: block;
}

/* IMPORTANT FIX */
.result-box h3,
.result-box p,
.result-box span {
    color: var(--text);   /* Always readable */
}

.result-value {
    font-size: 2rem;
    font-weight: 800;
    color: var(--primary);
}

/* Agar tap pe background change ho raha hai to text safe rahe */
.result-box:active,
.result-box:focus {
    background: var(--primary);
}

.result-box:active *,
.result-box:focus * {
    color: #111 !important;   /* Light mode me readable */
}
</style>
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#instrumentation" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>
        <div class="calc-card">
            <h2>Profibus PA / DP Cable Length</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Baud rate (kbps):</label>
                    <select id="baud">
                        <option value="93.75">93.75</option>
                        <option value="187.5">187.5</option>
                        <option value="500">500</option>
                        <option value="1500">1500</option>
                        <option value="12000">12000</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cable type:</label>
                    <select id="cable">
                        <option value="A">Type A (shielded twisted pair)</option>
                        <option value="B">Type B (ordinary)</option>
                    </select>
                </div>
                <button type="button" class="btn" onclick="calculate()">Max Segment Length</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Maximum segment length: <strong id="len">0</strong> m</p>
                <p>Recommended repeater spacing: <strong id="rep">0</strong> m</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const baud = parseFloat(document.getElementById('baud').value);
            const cable = document.getElementById('cable').value;

            let maxLen;
            if (cable === 'A') {
                if (baud <= 93.75) maxLen = 1200;
                else if (baud <= 187.5) maxLen = 1000;
                else if (baud <= 500) maxLen = 400;
                else if (baud <= 1500) maxLen = 200;
                else maxLen = 100;
            } else {
                if (baud <= 93.75) maxLen = 1200;
                else if (baud <= 187.5) maxLen = 600;
                else if (baud <= 500) maxLen = 200;
                else maxLen = 100;
            }

            document.getElementById('len').innerText = maxLen;
            document.getElementById('rep').innerText = Math.floor(maxLen * 0.8);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
