<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PID Tuning - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#instrumentation" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>
        <div class="calc-card">
            <h2>Ziegler‑Nichols PID Tuning</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Ultimate gain Ku:</label>
                    <input type="number" id="Ku" step="0.1" value="4">
                </div>
                <div class="form-group">
                    <label>Ultimate period Pu (s):</label>
                    <input type="number" id="Pu" step="0.1" value="10">
                </div>
                <div class="form-group">
                    <label>Controller type:</label>
                    <select id="type">
                        <option value="P">P</option>
                        <option value="PI">PI</option>
                        <option value="PID">PID</option>
                    </select>
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate Gains</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Kp: <strong id="Kp">0</strong></p>
                <p>Ti (s): <strong id="Ti">0</strong></p>
                <p>Td (s): <strong id="Td">0</strong></p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const Ku = parseFloat(document.getElementById('Ku').value);
            const Pu = parseFloat(document.getElementById('Pu').value);
            const type = document.getElementById('type').value;

            let Kp, Ti, Td;
            if (type === 'P') {
                Kp = 0.5 * Ku;
                Ti = Infinity;
                Td = 0;
            } else if (type === 'PI') {
                Kp = 0.45 * Ku;
                Ti = Pu / 1.2;
                Td = 0;
            } else {
                Kp = 0.6 * Ku;
                Ti = Pu / 2;
                Td = Pu / 8;
            }

            document.getElementById('Kp').innerText = Kp.toFixed(3);
            document.getElementById('Ti').innerText = Ti === Infinity ? '∞' : Ti.toFixed(2);
            document.getElementById('Td').innerText = Td.toFixed(3);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
