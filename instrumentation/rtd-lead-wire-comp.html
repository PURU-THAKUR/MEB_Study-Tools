<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTD Lead Wire Comp. - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#instrumentation" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>
        <div class="calc-card">
            <h2>RTD Lead Wire Resistance Error</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>RTD resistance at 0°C (Ω):</label>
                    <input type="number" id="R0" step="0.1" value="100">
                </div>
                <div class="form-group">
                    <label>Lead resistance per wire (Ω):</label>
                    <input type="number" id="Rlead" step="0.01" value="0.5">
                </div>
                <div class="form-group">
                    <label>Wiring configuration:</label>
                    <select id="wiring">
                        <option value="2">2‑wire</option>
                        <option value="3">3‑wire</option>
                        <option value="4">4‑wire</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>RTD temperature coefficient α (Ω/Ω/°C):</label>
                    <input type="number" id="alpha" step="0.0001" value="0.00385">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate Error</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Measured resistance (apparent): <strong id="Rmeas">0</strong> Ω</p>
                <p>Temperature error: <strong id="err">0</strong> °C</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        function calculate() {
            const R0 = parseFloat(document.getElementById('R0').value);
            const Rlead = parseFloat(document.getElementById('Rlead').value);
            const wiring = document.getElementById('wiring').value;
            const alpha = parseFloat(document.getElementById('alpha').value);

            let Rmeas;
            if (wiring === '2') {
                Rmeas = R0 + 2 * Rlead;
            } else if (wiring === '3') {
                Rmeas = R0 + Rlead; // approximate compensation
            } else {
                Rmeas = R0;
            }

            const tempErr = (Rmeas - R0) / (R0 * alpha);

            document.getElementById('Rmeas').innerText = Rmeas.toFixed(2);
            document.getElementById('err').innerText = tempErr.toFixed(3);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
