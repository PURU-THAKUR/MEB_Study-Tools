<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermocouple CJC - MEP Study & Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>...</header>
    <div class="calc-container">
        <a href="../index.html#instrumentation" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Instrumentation</a>
        <div class="calc-card">
            <h2>Thermocouple Cold Junction Compensation</h2>
            <form id="calcForm">
                <div class="form-group">
                    <label>Thermocouple type:</label>
                    <select id="type">
                        <option value="K">Type K</option>
                        <option value="J">Type J</option>
                        <option value="T">Type T</option>
                        <option value="E">Type E</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Measured voltage at terminals (mV):</label>
                    <input type="number" id="Vmeas" step="0.01" value="4.0">
                </div>
                <div class="form-group">
                    <label>Reference junction temperature (°C):</label>
                    <input type="number" id="Tcj" step="0.1" value="22">
                </div>
                <button type="button" class="btn" onclick="calculate()">Calculate True Temp</button>
            </form>
            <div class="result-box" id="result" style="display:none;">
                <p>Voltage equivalent of reference: <strong id="Vcj">0</strong> mV</p>
                <p>Total voltage (hot + cold): <strong id="Vtotal">0</strong> mV</p>
                <p>True temperature: <strong id="temp">0</strong> °C</p>
            </div>
        </div>
    </div>
    <footer>...</footer>
    <script src="../script.js"></script>
    <script>
        // Simplified polynomial coefficients for Type K (NIST)
        function voltageToTempK(mV) {
            // Rough approximation: T = 0.04*mV^2 + 24.5*mV
            return 0.04 * mV * mV + 24.5 * mV;
        }

        function tempToVoltageK(T) {
            // Inverse approx
            return (-24.5 + Math.sqrt(24.5*24.5 + 0.16*T)) / 0.08;
        }

        function calculate() {
            const type = document.getElementById('type').value;
            const Vmeas = parseFloat(document.getElementById('Vmeas').value);
            const Tcj = parseFloat(document.getElementById('Tcj').value);

            // For simplicity, use Type K polynomials for all types (approximate)
            const Vcj = tempToVoltageK(Tcj);
            const Vtotal = Vmeas + Vcj;
            const Ttrue = voltageToTempK(Vtotal);

            document.getElementById('Vcj').innerText = Vcj.toFixed(3);
            document.getElementById('Vtotal').innerText = Vtotal.toFixed(3);
            document.getElementById('temp').innerText = Ttrue.toFixed(1);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
